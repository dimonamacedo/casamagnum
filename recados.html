<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recados — Casa Magnum</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#1E4D35;--verde-m:#2E6B4F;--verde-c:#4A8C6A;--verde-bg:#EAF5EE;--verde-bd:#B8DFC8;
  --ouro:#B8975A;--ouro-c:#D4B483;--ouro-bg:#FDF6E8;--ouro-bd:#EAD9A0;
  --rosa:#C4648A;--rosa-bg:#FDF0F4;--rosa-bd:#F0C8D8;
  --lilas:#8B6BAE;--lilas-bg:#F4F0FA;--lilas-bd:#D4C4EC;
  --azul:#4A7FB5;--azul-bg:#EEF4FB;--azul-bd:#BDD4EC;
  --verm:#C44040;--verm-bg:#FDEAEA;--verm-bd:#F0B8B8;
  --creme:#F8F5F0;--creme-e:#EDE8DF;
  --txt:#1A1A18;--txt-s:#5A574F;--branco:#FFFFFF;--r:8px;
}
html,body{min-height:100vh;background:var(--creme);color:var(--txt);font-family:'Inter',system-ui,sans-serif}

/* TRAVA DE ACESSO */
.cm-lock{position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#1E4D35,#173F2A);display:flex;align-items:center;justify-content:center;padding:20px}
.cm-lock-box{background:#fff;border-radius:16px;padding:36px 30px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.cm-lock-box h2{font-family:'Cormorant Garamond',serif;font-size:26px;color:#1E4D35;margin-bottom:6px;font-weight:400}
.cm-lock-box p{font-size:13px;color:#5A574F;margin-bottom:18px}
.cm-lock-box input{width:100%;padding:12px 14px;border:1.5px solid #EDE8DF;border-radius:10px;font-size:15px;text-align:center;margin-bottom:12px;box-sizing:border-box;font-family:inherit}
.cm-lock-box button{width:100%;padding:12px;border:none;border-radius:10px;background:#1E4D35;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.cm-lock-box button:hover{background:#173F2A}
.cm-lock-err{color:#C44040;font-size:12px;margin-top:8px;display:none}

/* TOPO */
.topo{background:var(--verde);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.topo-back{color:rgba(255,255,255,.85);text-decoration:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.topo-titulo{font-family:'Cormorant Garamond',serif;font-size:16px;color:#fff;letter-spacing:.5px}

.hero{background:linear-gradient(135deg,var(--lilas) 0%,var(--rosa) 100%);padding:28px 20px 30px;text-align:center}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:30px;color:#fff;font-weight:400}
.hero p{font-size:13px;color:rgba(255,255,255,.85);margin-top:6px}

.wrap{max-width:640px;margin:0 auto;padding:20px 16px 60px}

/* QUEM SOU EU */
.quemsou{background:#fff;border:1px solid var(--creme-e);border-radius:var(--r);padding:16px;margin-bottom:16px}
.quemsou-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-s);margin-bottom:10px}
.pessoa-chips{display:flex;gap:8px;flex-wrap:wrap}
.pchip{padding:8px 16px;border-radius:100px;border:1.5px solid var(--creme-e);background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--txt)}
.pchip.on{background:var(--verde);border-color:var(--verde);color:#fff}

/* COMPOR */
.compor{background:#fff;border:1px solid var(--creme-e);border-radius:var(--r);padding:16px;margin-bottom:20px}
.compor-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-s);margin-bottom:8px}
.dest-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dchip{padding:6px 14px;border-radius:100px;border:1.5px solid var(--creme-e);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--txt)}
.dchip.on{background:var(--lilas);border-color:var(--lilas);color:#fff}
.compor textarea{width:100%;min-height:80px;padding:12px 14px;border:1.5px solid var(--creme-e);border-radius:var(--r);font-family:inherit;font-size:14px;resize:vertical;margin-bottom:12px}
.compor textarea:focus{outline:none;border-color:var(--lilas)}
.urg-check{display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;font-size:13px;color:var(--txt)}
.urg-check input{width:18px;height:18px;accent-color:var(--verm)}
.btn-enviar{width:100%;padding:13px;border:none;border-radius:100px;background:var(--verde);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-enviar:hover{background:var(--verde-m)}
.btn-enviar:disabled{opacity:.6;cursor:default}
.envio-fb{margin-top:10px;font-size:12px;text-align:center;padding:8px;border-radius:var(--r);display:none}

/* LISTA */
.lista-topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.lista-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-s)}
.btn-refresh{background:none;border:1px solid var(--creme-e);border-radius:100px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--txt-s);cursor:pointer}
.btn-refresh:hover{border-color:var(--ouro);color:var(--verde)}

.filtro-chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fchip{padding:5px 12px;border-radius:100px;border:1px solid var(--creme-e);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--txt-s)}
.fchip.on{background:var(--verde-bg);border-color:var(--verde-bd);color:var(--verde)}

.recado-card{background:#fff;border:1px solid var(--creme-e);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;position:relative}
.recado-card.nao-lido{border-left:3px solid var(--lilas)}
.recado-card.urgente{background:var(--verm-bg);border-color:var(--verm-bd)}
.recado-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
.recado-quem{font-size:13px;font-weight:700;color:var(--verde)}
.recado-para{font-size:11px;color:var(--txt-s);font-weight:400}
.recado-hora{font-size:11px;color:var(--txt-s);white-space:nowrap}
.recado-urg-badge{display:inline-block;background:var(--verm);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-right:6px}
.recado-texto{font-size:14px;color:var(--txt);line-height:1.5;white-space:pre-wrap}
.recado-foot{display:flex;justify-content:flex-end;margin-top:10px}
.btn-lido{background:none;border:1px solid var(--creme-e);border-radius:100px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--txt-s);cursor:pointer}
.btn-lido:hover{border-color:var(--verde);color:var(--verde)}
.btn-lido.done{color:var(--verde);border-color:var(--verde-bd);background:var(--verde-bg)}

.vazio{text-align:center;padding:40px 20px;color:var(--txt-s);font-size:13px}
.carregando{text-align:center;padding:30px 20px;color:var(--txt-s);font-size:13px}
</style>
</head>
<body>

<div class="cm-lock" id="cmLock">
  <div class="cm-lock-box">
    <h2>Casa Magnum</h2>
    <p>Digite a senha de acesso para continuar</p>
    <input type="password" id="cmLockInput" placeholder="Senha" onkeydown="if(event.key==='Enter')cmCheckLock()">
    <button onclick="cmCheckLock()">Entrar</button>
    <div class="cm-lock-err" id="cmLockErr">Senha incorreta. Tente novamente.</div>
  </div>
</div>
<script>
(function(){
  var SENHA_CM='casamagnum2026';
  if(localStorage.getItem('cm_unlocked')==='1'){
    document.getElementById('cmLock').style.display='none';
  }
  window.cmCheckLock=function(){
    var v=document.getElementById('cmLockInput').value;
    if(v===SENHA_CM){
      try{localStorage.setItem('cm_unlocked','1');}catch(e){}
      document.getElementById('cmLock').style.display='none';
    } else {
      document.getElementById('cmLockErr').style.display='block';
    }
  };
})();
</script>

<div class="topo">
  <a href="index.html" class="topo-back">← Início</a>
  <div class="topo-titulo">Casa Magnum</div>
</div>

<div class="hero">
  <h1>💬 Recados</h1>
  <p>Mural de mensagens entre a Dimona e a equipe</p>
</div>

<div class="wrap">

  <div class="quemsou">
    <div class="quemsou-lbl">Quem está usando agora?</div>
    <div class="pessoa-chips" id="pessoa-chips">
      <div class="pchip" onclick="setPessoa('Dimona',this)">Dimona</div>
      <div class="pchip" onclick="setPessoa('Rose',this)">Rose</div>
      <div class="pchip" onclick="setPessoa('Célia',this)">Célia</div>
      <div class="pchip" onclick="setPessoa('Fernanda',this)">Fernanda</div>
    </div>
  </div>

  <div class="compor">
    <div class="compor-lbl">Enviar recado para:</div>
    <div class="dest-chips" id="dest-chips"></div>
    <textarea id="txt-recado" placeholder="Escreva seu recado aqui..."></textarea>
    <label class="urg-check">
      <input type="checkbox" id="chk-urgente">
      ⚠️ Marcar como urgente
    </label>
    <button class="btn-enviar" id="btn-enviar" onclick="enviarRecado()">Enviar recado</button>
    <div class="envio-fb" id="envio-fb"></div>
  </div>

  <div class="lista-topo">
    <div class="lista-lbl">Recados</div>
    <button class="btn-refresh" onclick="carregarRecados()">↺ Atualizar</button>
  </div>
  <div class="filtro-chips" id="filtro-chips">
    <div class="fchip on" onclick="setFiltro('relevantes',this)">Pra mim</div>
    <div class="fchip" onclick="setFiltro('todos',this)">Todos os recados</div>
  </div>

  <div id="lista-recados"><div class="carregando">Carregando recados...</div></div>

</div>

<script>
var SHEETS_URL='https://script.google.com/macros/s/AKfycbyHCU2bqqchRE-T_tsz4P5wiPGugPOAXfedk40ZoC4r8f29S1L6a4z60v-scPt4NvaW3A/exec';
var PESSOAS=['Dimona','Rose','Célia','Fernanda'];
var pessoaAtual=null;
var destinoAtual='Todos';
var filtroAtual='relevantes';
var recadosCache=[];

function setPessoa(nome,btn){
  pessoaAtual=nome;
  try{localStorage.setItem('cm_recado_pessoa',nome);}catch(e){}
  document.querySelectorAll('#pessoa-chips .pchip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
  renderDestChips();
  renderLista();
}

function renderDestChips(){
  var el=document.getElementById('dest-chips');
  var opcoes=['Todos'].concat(PESSOAS.filter(function(p){return p!==pessoaAtual;}));
  destinoAtual='Todos';
  el.innerHTML=opcoes.map(function(p,i){
    return '<div class="dchip'+(i===0?' on':'')+'" onclick="setDestino(\''+p+'\',this)">'+p+'</div>';
  }).join('');
}
function setDestino(nome,btn){
  destinoAtual=nome;
  document.querySelectorAll('#dest-chips .dchip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
}

function setFiltro(f,btn){
  filtroAtual=f;
  document.querySelectorAll('#filtro-chips .fchip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
  renderLista();
}

function chaveLidos(){return 'cm_recados_lidos_'+(pessoaAtual||'x');}
function getLidos(){
  try{return JSON.parse(localStorage.getItem(chaveLidos())||'{}');}catch(e){return {};}
}
function marcarLido(id){
  var lidos=getLidos();
  lidos[id]=!lidos[id];
  try{localStorage.setItem(chaveLidos(),JSON.stringify(lidos));}catch(e){}
  renderLista();
}

function enviarRecado(){
  if(!pessoaAtual){alert('Escolha quem está enviando o recado (Dimona, Rose, Célia ou Fernanda).');return;}
  var texto=document.getElementById('txt-recado').value.trim();
  if(!texto){alert('Escreva uma mensagem antes de enviar.');return;}
  var urgente=document.getElementById('chk-urgente').checked;
  var btn=document.getElementById('btn-enviar');
  var fb=document.getElementById('envio-fb');
  btn.disabled=true;
  fb.style.display='block';
  fb.style.background='var(--azul-bg)';
  fb.style.color='var(--azul)';
  fb.textContent='⏳ Enviando...';

  fetch(SHEETS_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({app:'recado',remetente:pessoaAtual,destinatario:destinoAtual,urgente:urgente,texto:texto})
  }).then(function(){
    fb.style.background='var(--verde-bg)';
    fb.style.color='var(--verde)';
    fb.textContent='✅ Recado enviado!';
    document.getElementById('txt-recado').value='';
    document.getElementById('chk-urgente').checked=false;
    btn.disabled=false;
    setTimeout(function(){fb.style.display='none';},3000);
    setTimeout(carregarRecados,1500);
  }).catch(function(){
    fb.style.background='var(--verm-bg)';
    fb.style.color='var(--verm)';
    fb.textContent='❌ Não foi possível enviar. Confira sua internet e tente de novo.';
    btn.disabled=false;
  });
}

function carregarRecados(){
  document.getElementById('lista-recados').innerHTML='<div class="carregando">Carregando recados...</div>';
  fetch(SHEETS_URL+'?app=recados')
    .then(function(r){return r.json();})
    .then(function(data){
      recadosCache=(data&&data.recados)?data.recados:[];
      recadosCache.reverse(); // mais recente primeiro
      renderLista();
    })
    .catch(function(){
      document.getElementById('lista-recados').innerHTML='<div class="vazio">Não foi possível carregar os recados agora. Verifique sua internet e toque em "Atualizar".</div>';
    });
}

function renderLista(){
  var el=document.getElementById('lista-recados');
  if(!pessoaAtual){
    el.innerHTML='<div class="vazio">Escolha quem é você lá em cima para ver seus recados.</div>';
    return;
  }
  var lidos=getLidos();
  var itens=recadosCache.filter(function(r){
    if(filtroAtual==='todos') return true;
    return r.destinatario==='Todos'||r.destinatario===pessoaAtual||r.remetente===pessoaAtual;
  });
  if(!itens.length){
    el.innerHTML='<div class="vazio">Nenhum recado por aqui ainda.</div>';
    return;
  }
  el.innerHTML=itens.map(function(r){
    var id=r.id;
    var lido=!!lidos[id];
    var urgenteClasse=(r.urgente==='Sim'||r.urgente===true)?' urgente':'';
    var naoLidoClasse=(!lido&&r.remetente!==pessoaAtual)?' nao-lido':'';
    var paraTxt=r.destinatario&&r.destinatario!=='Todos'?' → '+r.destinatario:' → Todos';
    var urgBadge=(r.urgente==='Sim'||r.urgente===true)?'<span class="recado-urg-badge">URGENTE</span>':'';
    return '<div class="recado-card'+urgenteClasse+naoLidoClasse+'">'
      +'<div class="recado-head"><div><span class="recado-quem">'+r.remetente+'</span><span class="recado-para">'+paraTxt+'</span></div><div class="recado-hora">'+r.dataHora+'</div></div>'
      +'<div class="recado-texto">'+urgBadge+escapeHtml(r.texto)+'</div>'
      +'<div class="recado-foot"><button class="btn-lido'+(lido?' done':'')+'" onclick="marcarLido('+id+')">'+(lido?'✓ Lido':'Marcar como lido')+'</button></div>'
      +'</div>';
  }).join('');
}

function escapeHtml(s){
  var d=document.createElement('div');
  d.textContent=s||'';
  return d.innerHTML;
}

// INIT
(function(){
  var salvo=localStorage.getItem('cm_recado_pessoa');
  if(salvo){
    var btns=document.querySelectorAll('#pessoa-chips .pchip');
    for(var i=0;i<btns.length;i++){
      if(btns[i].textContent===salvo){ setPessoa(salvo,btns[i]); break; }
    }
  }
  carregarRecados();
})();
</script>

</body>
</html>
