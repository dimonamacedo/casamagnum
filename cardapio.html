<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio — Casa Magnum</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#1E4D35;--verde-m:#2E6B4F;--verde-c:#4A8C6A;
  --ouro:#B8975A;--ouro-c:#D4B483;
  --creme:#F8F5F0;--creme-e:#EDE8DF;
  --txt:#1A1A18;--txt-s:#5A574F;--branco:#FFFFFF;--r:4px;
}
html,body{min-height:100vh;background:var(--creme);color:var(--txt);font-family:'Inter',system-ui,sans-serif}

/* TOPO */
.topo{background:var(--verde);padding:12px 40px;display:flex;align-items:center;justify-content:space-between}
.topo-marca{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--ouro-c);text-decoration:none}
.topo-data{font-size:11px;font-weight:300;letter-spacing:1px;color:rgba(255,255,255,.45)}

/* HERO */
.hero{background:var(--verde);padding:36px 40px 48px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 110%,rgba(184,151,90,.12) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--ouro);margin-bottom:12px;opacity:.85}
.hero-titulo{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,60px);font-weight:300;color:var(--branco);letter-spacing:-1px;line-height:1}
.hero-titulo em{font-style:italic;color:var(--ouro-c)}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:rgba(255,255,255,.45);margin-top:10px}

/* ABAS PRINCIPAIS */
.abas-wrap{background:var(--branco);border-bottom:1px solid var(--creme-e);padding:0 40px;display:flex;gap:0}
.aba-btn{padding:14px 24px;font-size:13px;font-weight:500;color:var(--txt-s);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;background:none;border-top:none;border-left:none;border-right:none}
.aba-btn:hover{color:var(--verde-m)}
.aba-btn.on{color:var(--verde-m);border-bottom-color:var(--verde-m)}
.aba-pnl{display:none}.aba-pnl.on{display:block}

/* SEMANA STATUS */
.semana-wrap{padding:20px 40px 0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.sem-status-badge{background:var(--verde);color:#fff;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:100px}
.sem-status-ok{font-size:12px;color:var(--verde-m)}
.sem-consulta-txt{font-size:12px;color:var(--ouro);font-style:italic}
.semana-label{font-size:12px;font-weight:500;color:var(--txt-s);letter-spacing:.5px}
.semana-chips{display:flex;gap:6px;flex-wrap:wrap}
.schip{padding:5px 13px;border-radius:100px;font-size:12px;cursor:pointer;border:1px solid var(--creme-e);background:var(--branco);color:var(--txt-s);transition:all .15s;user-select:none}
.schip.on{background:var(--verde);color:var(--branco);border-color:var(--verde)}
.schip:hover:not(.on){border-color:var(--verde-c);color:var(--verde-m)}

/* GRID DIAS */
.dias-grid{padding:20px 40px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* CARD DIA */
.dia-card{background:var(--branco);border:1px solid var(--creme-e);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s}
.dia-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.08)}
.dia-card.hoje{border-color:var(--verde-m);box-shadow:0 0 0 2px rgba(46,107,79,.15)}
.dia-header{padding:13px 16px 11px;border-bottom:1px solid var(--creme-e);display:flex;align-items:center;justify-content:space-between}
.dia-nome{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--txt)}
.dia-hoje-badge{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--verde-m);background:rgba(46,107,79,.08);padding:3px 10px;border-radius:100px}
.dia-fds-badge{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--ouro)}
.dia-body{padding:14px 16px}
.dia-section{margin-bottom:12px}
.dia-section:last-child{margin-bottom:0}
.dia-section-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--txt-s);opacity:.6;margin-bottom:5px}
.dia-prato-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dia-prato{font-size:14px;font-weight:500;color:var(--txt);line-height:1.4;flex:1}
.rec-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;opacity:.6;transition:opacity .15s;flex-shrink:0;line-height:1}
.rec-btn:hover{opacity:1}
.dia-acomp{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.dia-acomp span{background:var(--creme);border:1px solid var(--creme-e);border-radius:100px;padding:2px 9px;font-size:11px;color:var(--txt-s)}
.dia-sobremesa{margin-top:10px;padding:9px 11px;background:linear-gradient(135deg,rgba(184,151,90,.08),rgba(184,151,90,.04));border:1px solid rgba(184,151,90,.25);border-radius:var(--r)}
.dia-sobremesa-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--ouro);margin-bottom:3px}
.dia-sobremesa-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dia-sobremesa-txt{font-size:12px;color:var(--txt-s);flex:1}
.dia-salada-chef{margin-top:10px;padding:9px 11px;background:rgba(46,107,79,.05);border:1px solid rgba(46,107,79,.2);border-radius:var(--r)}
.dia-salada-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--verde-m);margin-bottom:3px}
.dia-salada-txt{font-size:12px;color:var(--txt-s);font-style:italic}

/* ROTAÇÃO */
.rotacao-wrap{padding:0 40px 60px}
.rotacao-titulo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--txt);margin-bottom:4px}
.rotacao-sub{font-size:13px;color:var(--txt-s);margin-bottom:20px}
.rotacao-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.rot-card{background:var(--branco);border:1px solid var(--creme-e);border-radius:var(--r);padding:16px}
.rot-dia{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ouro);margin-bottom:10px}
.rot-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--creme-e);font-size:13px;color:var(--txt-s);align-items:flex-start}
.rot-item:last-child{border-bottom:none}
.rot-n{width:18px;height:18px;border-radius:50%;background:var(--creme-e);color:var(--txt-s);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rot-item.atual .rot-n{background:var(--verde);color:var(--branco)}
.rot-item.atual{color:var(--txt);font-weight:500}

/* RECEITAS */
.rec-cats{display:flex;gap:8px;flex-wrap:wrap;padding:24px 40px 0}
.cat-btn{padding:6px 16px;border-radius:100px;font-size:12px;cursor:pointer;border:1px solid var(--creme-e);background:var(--branco);color:var(--txt-s);transition:all .15s;user-select:none}
.cat-btn.on{background:var(--verde-m);color:var(--branco);border-color:var(--verde-m)}
.rec-grid{padding:16px 40px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.rec-card{background:var(--branco);border:1px solid var(--creme-e);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s}
.rec-card:hover{border-color:var(--verde-c);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07)}
.rec-card-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
.rec-card-icon{font-size:22px;flex-shrink:0}
.rec-card-nome{font-size:14px;font-weight:500;color:var(--txt)}
.rec-card-cat{font-size:11px;color:var(--txt-s);margin-top:2px}
.rec-card-chevron{margin-left:auto;color:var(--creme-e);font-size:18px;transition:all .2s}
.rec-card:hover .rec-card-chevron{color:var(--verde-m)}
.rec-card-body{display:none;padding:0 16px 16px;border-top:1px solid var(--creme-e)}
.rec-card.open .rec-card-body{display:block}
.rec-card.open .rec-card-chevron{transform:rotate(180deg);color:var(--verde-m)}
.rec-section{margin-top:12px}
.rec-section-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt-s);opacity:.6;margin-bottom:8px}
.rec-ing{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.rec-ing span{background:var(--creme);border:1px solid var(--creme-e);border-radius:100px;padding:3px 10px;font-size:12px;color:var(--txt-s)}
.rec-step{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--creme-e)}
.rec-step:last-child{border-bottom:none}
.rec-step-n{width:22px;height:22px;border-radius:50%;background:rgba(46,107,79,.08);color:var(--verde-m);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rec-step-t{font-size:13px;color:var(--txt);line-height:1.5}
.rec-obs{font-size:12px;color:var(--ouro);background:rgba(184,151,90,.07);border:1px solid rgba(184,151,90,.2);border-radius:var(--r);padding:8px 11px;margin-top:10px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--branco);border-radius:8px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--creme-e);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--branco)}
.modal-titulo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--txt)}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--txt-s);line-height:1;padding:2px}
.modal-body{padding:20px 24px 28px}
.modal-section{margin-bottom:18px}
.modal-section-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt-s);opacity:.6;margin-bottom:10px}
.modal-ing{display:flex;flex-wrap:wrap;gap:5px}
.modal-ing span{background:var(--creme);border:1px solid var(--creme-e);border-radius:100px;padding:4px 12px;font-size:12px;color:var(--txt-s)}
.modal-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--creme-e)}
.modal-step:last-child{border-bottom:none}
.modal-step-n{width:26px;height:26px;border-radius:50%;background:rgba(46,107,79,.08);color:var(--verde-m);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.modal-step-t{font-size:14px;color:var(--txt);line-height:1.6}
.modal-obs{font-size:13px;color:var(--ouro);background:rgba(184,151,90,.07);border:1px solid rgba(184,151,90,.2);border-radius:var(--r);padding:10px 14px;margin-top:12px}

/* DIVISOR */
.divisor{display:flex;align-items:center;gap:16px;margin:0 40px 32px}
.div-linha{flex:1;height:1px;background:var(--creme-e)}
.div-icone{color:var(--ouro);font-size:12px;letter-spacing:4px;opacity:.5}

/* RODAPÉ */
footer{border-top:1px solid var(--creme-e);padding:24px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
footer a{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--verde-m);text-decoration:none;opacity:.7}
footer span{font-size:11px;color:var(--txt-s);opacity:.5}

@media(max-width:640px){
  .topo,.hero,.semana-wrap,.dias-grid,.rotacao-wrap,.divisor,.rec-cats,.rec-grid,footer{padding-left:20px;padding-right:20px}
  .abas-wrap{padding:0 20px}
}
</style>
</head>
<body>

<div class="topo">
  <a class="topo-marca" href="index.html">← Casa Magnum</a>
  <span class="topo-data" id="topo-data"></span>
</div>

<div class="hero">
  <div class="hero-eyebrow">Almoço</div>
  <h1 class="hero-titulo">Cardápio <em>Semanal</em></h1>
  <p class="hero-sub">Rotação de 4 semanas</p>
</div>

<div class="abas-wrap">
  <button class="aba-btn on" onclick="setAba('cardapio',this)">📅 Cardápio</button>
  <button class="aba-btn" onclick="setAba('receitas',this)">📖 Receitas</button>
</div>

<!-- ABA CARDÁPIO -->
<div class="aba-pnl on" id="aba-cardapio">
  <div class="semana-wrap">
    <div id="sem-status"></div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="semana-label">Consultar:</span>
      <div class="semana-chips">
        <div class="schip" onclick="setSemana(1,this)">Sem. 1</div>
        <div class="schip" onclick="setSemana(2,this)">Sem. 2</div>
        <div class="schip" onclick="setSemana(3,this)">Sem. 3</div>
        <div class="schip" onclick="setSemana(4,this)">Sem. 4</div>
      </div>
    </div>
  </div>
  <div class="dias-grid" id="dias-grid"></div>
  <div class="divisor"><div class="div-linha"></div><span class="div-icone">✦</span><div class="div-linha"></div></div>
  <div class="rotacao-wrap">
    <div class="rotacao-titulo">Rotação dos pratos</div>
    <p class="rotacao-sub">Cada dia da semana tem seu estilo fixo — a variação acontece a cada semana do ciclo.</p>
    <div class="rotacao-grid" id="rot-grid"></div>
  </div>
</div>

<!-- ABA RECEITAS -->
<div class="aba-pnl" id="aba-receitas">
  <div class="rec-cats" id="rec-cats"></div>
  <div class="rec-grid" id="rec-grid"></div>
</div>

<!-- MODAL RECEITA -->
<div class="modal-bg" id="modal-bg" onclick="fecharModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<footer>
  <a href="index.html">← Voltar para Casa Magnum</a>
  <span id="rodape-ano"></span>
</footer>

<script>
var hoje=new Date();hoje.setHours(0,0,0,0);
var mesesN=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
var diasN=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
document.getElementById('topo-data').textContent=diasN[hoje.getDay()]+', '+hoje.getDate()+' de '+mesesN[hoje.getMonth()]+' de '+hoje.getFullYear();
document.getElementById('rodape-ano').textContent='© '+hoje.getFullYear()+' Casa Magnum';

// CICLO
var inicioCiclo=new Date(2025,6,6);inicioCiclo.setHours(0,0,0,0);
function semCiclo(d){var diff=Math.floor((d-inicioCiclo)/(7*24*3600*1000));if(diff<0)return null;return(diff%4)+1;}
var semHoje=semCiclo(hoje)||1;

// ABAS
function setAba(id,btn){
  document.querySelectorAll('.aba-pnl').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.aba-btn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('aba-'+id).classList.add('on');
  btn.classList.add('on');
}

// RECEITAS
var receitas={
  'tiramisu':{
    nome:'Tiramisù',cat:'Sobremesas',icon:'☕',
    ing:['500g mascarpone','4 ovos','100g açúcar','200ml café forte frio','Biscoito champanhe (2 pacotes)','Cacau em pó para polvilhar','Amaretto (opcional)'],
    steps:[
      'Separe as gemas das claras. Bata as gemas com o açúcar até obter um creme claro e espesso.',
      'Adicione o mascarpone às gemas e misture até ficar homogêneo.',
      'Bata as claras em neve firme e incorpore delicadamente à mistura com espátula.',
      'Prepare o café forte e deixe esfriar. Adicione o amaretto se quiser.',
      'Molhe rapidamente os biscoitos no café (não deixe encharcar) e faça uma camada numa travessa.',
      'Espalhe metade do creme de mascarpone sobre os biscoitos.',
      'Repita com mais uma camada de biscoitos e finalize com o creme.',
      'Polvilhe generosamente com cacau em pó.',
      'Leve à geladeira por pelo menos 4 horas — de um dia para o outro fica ainda melhor.'
    ],
    obs:'Use ovos bem frescos. O Tiramisù deve ficar bem gelado para ser servido.'
  },
  'torta-abacaxi':{
    nome:'Torta gelada de abacaxi',cat:'Sobremesas',icon:'🍍',
    ing:['1 lata leite condensado','1 creme de leite','1 abacaxi picado','Biscoito maisena (2 pacotes)','Leite para umedecer','Chantilly para cobrir','Coco ralado para decorar'],
    steps:[
      'Cozinhe o abacaxi picado com 2 colheres de açúcar em fogo médio até amolecer levemente. Reserve.',
      'Bata o leite condensado com o creme de leite até misturar bem.',
      'Umedeça os biscoitos levemente no leite e faça uma camada no fundo da travessa.',
      'Espalhe metade do creme de leite condensado.',
      'Adicione uma camada do abacaxi cozido.',
      'Repita com biscoitos, creme e finalize com o abacaxi.',
      'Cubra com chantilly e decore com coco ralado.',
      'Leve ao freezer por 3 horas. Retire 10 minutos antes de servir.'
    ],
    obs:'Pode substituir o abacaxi cozido por abacaxi em calda bem escorrido para facilitar.'
  },
  'pudim':{
    nome:'Pudim de leite condensado',cat:'Sobremesas',icon:'🍮',
    ing:['1 lata leite condensado','A mesma medida de leite integral','3 ovos inteiros','1 xícara de açúcar (para a calda)','½ xícara de água (para a calda)'],
    steps:[
      'Calda: derreta o açúcar em fogo médio sem mexer até caramelizar dourado. Adicione a água aquecida com cuidado (vai espirrar). Mexa até dissolver e despeje na forma.',
      'Bata no liquidificador o leite condensado, o leite e os ovos por 2 minutos.',
      'Despeje na forma caramelizada passando por uma peneira para eliminar bolhas.',
      'Cubra com papel alumínio e leve ao banho-maria no forno a 180°C por 1h a 1h20.',
      'Teste espetando um palito — deve sair limpo.',
      'Deixe esfriar completamente e leve à geladeira por pelo menos 4 horas.',
      'Para desenformar: passe uma faca nas bordas e vire sobre prato fundo.'
    ],
    obs:'Para um pudim sem furinhos, bata pouco e evite o liquidificador na potência alta. Coe sempre antes de colocar na forma.'
  },
  'dois-amores':{
    nome:'Dois Amores',cat:'Sobremesas',icon:'🍫',
    ing:['4 latas de leite condensado','3 caixas de creme de leite','1 copo de leite líquido','Maisena (a gosto)','3 pacotes de Oreo','3 ovos','Chocolate em pó 100% cacau','2 colheres de manteiga','3 colheres de açúcar'],
    steps:[
      '1º CREME (branco): Misture 2 latas de leite condensado, a mesma medida da lata de leite líquido, 3 gemas, 2 colheres de maisena e 1 creme de leite. Leve ao fogo baixo mexendo sempre até formar um creme. Continue mexendo por mais 5 minutos para cozinhar bem. Reserve.',
      '2º CREME (chocolate): Misture 2 latas de leite condensado, 6 colheres cheias de chocolate em pó 100%, 1 colher de maisena, 2 colheres de manteiga e 1 creme de leite. Leve ao fogo mexendo sempre até formar um creme. Reserve.',
      '3º CREME (neve): Bata as 3 claras em neve. Adicione aos poucos 3 colheres de açúcar, sempre batendo, até formar uma espuma firme. Pare de bater e adicione 1 creme de leite aos poucos, misturando delicadamente com espátula. Reserve.',
      'Tire o recheio dos biscoitos Oreo e trituje-os levemente.',
      'MONTAGEM: Adicione uma camada do creme branco, depois o Oreo triturado, mais uma camada do creme branco, depois o creme de chocolate e por último o creme de neve (claras).',
      'Leve ao freezer. Retire 15 minutos antes de servir.'
    ],
    obs:'As claras reservadas das gemas do 1º creme são exatamente as 3 claras usadas no 3º creme — sem desperdício!'
  },
  'carneiro-cozido':{
    nome:'Carneiro cozido',cat:'Carnes',icon:'🥩',
    ing:['1,5kg pernil ou paleta de carneiro em pedaços','4 dentes de alho','1 cebola','3 cenouras','3 batatas','Azeite','Sal, pimenta-do-reino','1 ramo de alecrim','1 folha de louro','500ml água ou caldo de legumes'],
    steps:[

var curCat='Todas';
var cats=['Todas','Sobremesas','Carnes','Aves','Peixes','Massas'];

function setAba(id,btn){
  document.querySelectorAll('.aba-pnl').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.aba-btn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('aba-'+id).classList.add('on');
  btn.classList.add('on');
}

function setCat(c,btn){
  curCat=c;
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderReceitas();
}

function renderCats(){
  document.getElementById('rec-cats').innerHTML=cats.map(function(c){
    return '<div class="cat-btn'+(c===curCat?' on':'')+'" onclick="setCat(\''+c+'\',this)">'+c+'</div>';
  }).join('');
}

function renderReceitas(){
  var lista=Object.keys(receitas).filter(function(k){
    return curCat==='Todas'||receitas[k].cat===curCat;
  });
  document.getElementById('rec-grid').innerHTML=lista.map(function(k){
    var r=receitas[k];
    var ings=r.ing.map(function(i){return '<span>'+i+'</span>';}).join('');
    var steps=r.steps.map(function(s,i){return '<div class="rec-step"><div class="rec-step-n">'+(i+1)+'</div><div class="rec-step-t">'+s+'</div></div>';}).join('');
    return '<div class="rec-card" id="rc-'+k+'">'+
      '<div class="rec-card-header" onclick="togRec(\''+k+'\')">'+
      '<span class="rec-card-icon">'+r.icon+'</span>'+
      '<div><div class="rec-card-nome">'+r.nome+'</div><div class="rec-card-cat">'+r.cat+'</div></div>'+
      '<span class="rec-card-chevron">⌄</span></div>'+
      '<div class="rec-card-body">'+
      '<div class="rec-section"><div class="rec-section-lbl">Ingredientes</div><div class="rec-ing">'+ings+'</div></div>'+
      '<div class="rec-section"><div class="rec-section-lbl">Modo de preparo</div>'+steps+'</div>'+
      (r.obs?'<div class="rec-obs">📌 '+r.obs+'</div>':'')+
      '</div></div>';
  }).join('');
}

function togRec(k){document.getElementById('rc-'+k).classList.toggle('open');}

// MODAL
function abrirModal(id){
  var r=receitas[id];
  if(!r) return;
  var ings=r.ing.map(function(i){return '<span>'+i+'</span>';}).join('');
  var steps=r.steps.map(function(s,i){return '<div class="modal-step"><div class="modal-step-n">'+(i+1)+'</div><div class="modal-step-t">'+s+'</div></div>';}).join('');
  document.getElementById('modal-content').innerHTML=
    '<div class="modal-header">'+
    '<div><div style="font-size:13px;color:var(--txt-s);margin-bottom:4px">'+r.cat+'</div>'+
    '<div class="modal-titulo">'+r.icon+' '+r.nome+'</div></div>'+
    '<button class="modal-close" onclick="fecharModal()">✕</button></div>'+
    '<div class="modal-body">'+
    '<div class="modal-section"><div class="modal-section-lbl">Ingredientes</div><div class="modal-ing">'+ings+'</div></div>'+
    '<div class="modal-section"><div class="modal-section-lbl">Modo de preparo</div>'+steps+'</div>'+
    (r.obs?'<div class="modal-obs">📌 '+r.obs+'</div>':'')+
    '</div>';
  document.getElementById('modal-bg').classList.add('on');
}

function fecharModal(e){
  if(!e||e.target===document.getElementById('modal-bg')) document.getElementById('modal-bg').classList.remove('on');
}

var curSem=semHoje;

function setSemana(n,btn){
  curSem=n;
  document.querySelectorAll('.schip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
  renderCardapio();
}

function atualizarStatus(){
  var el=document.getElementById('sem-status');
  if(!el) return;
  var isAuto=curSem===semHoje;
  var html='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  html+='<span class="sem-status-badge">Semana '+semHoje+' — Esta semana</span>';
  if(!isAuto) html+='<span class="sem-consulta-txt">Consultando semana '+curSem+'</span>';
  else html+='<span class="sem-status-ok">Cardápio calculado automaticamente ✓</span>';
  html+='</div>';
  el.innerHTML=html;
}

function dowParaIdx(dow){if(dow===0)return 6;return dow-1;}

function renderCardapio(){
  var s=curSem-1;
  var dowHoje=hoje.getDay();
  var idxHoje=dowParaIdx(dowHoje);
  var chefDia=diaChef[s];
  atualizarStatus();
  var html='';
  [0,1,2,3,4,5,6].forEach(function(dIdx){
    var d=cardapio[dIdx];
    var isHoje=dIdx===idxHoje&&curSem===semHoje;
    var isFDS=dIdx===5||dIdx===6;
    var isChef=!isFDS&&dIdx===chefDia;
    var recId=d.recIds?d.recIds[s]:null;
    var acompList=(d.acompExtra&&d.acompExtra[s])?d.acompExtra[s]:d.acomp;

    html+='<div class="dia-card'+(isHoje?' hoje':'')+'"><div class="dia-header">';
    html+='<span class="dia-nome">'+d.nome+'</span>';
    if(isHoje) html+='<span class="dia-hoje-badge">Hoje</span>';
    else if(isFDS) html+='<span class="dia-fds-badge">Fim de semana</span>';
    html+='</div><div class="dia-body">';

    html+='<div class="dia-section"><div class="dia-section-label">Prato principal</div>';
    html+='<div class="dia-prato-row"><span class="dia-prato">'+d.pratos[s]+'</span>';
    if(recId) html+='<button class="rec-btn" onclick="abrirModal(\''+recId+'\')" title="Ver receita">📖</button>';
    html+='</div></div>';

    html+='<div class="dia-section"><div class="dia-section-label">Acompanhamentos</div><div class="dia-acomp">';
    acompList.forEach(function(a){html+='<span>'+a+'</span>';});
    html+='</div></div>';

    if(isChef){
      html+='<div class="dia-salada-chef"><div class="dia-salada-label">🥗 Salada do Chef</div>';
      html+='<div class="dia-salada-txt">À escolha da cozinheira — criatividade da Rose!</div></div>';
    }

    if(d.sobremesa){
      var recSobId=d.recSob?d.recSob[s]:null;
      html+='<div class="dia-sobremesa"><div class="dia-sobremesa-label">✦ Sobremesa</div>';
      html+='<div class="dia-sobremesa-row"><span class="dia-sobremesa-txt">'+d.sobremesa[s]+'</span>';
      if(recSobId) html+='<button class="rec-btn" onclick="abrirModal(\''+recSobId+'\')" title="Ver receita">📖</button>';
      html+='</div></div>';
    }

    html+='</div></div>';
  });
  document.getElementById('dias-grid').innerHTML=html;
  renderRotacao();
}

  var rotDias=[
    {nome:'Segundas',icon:'🥩',itens:cardapio[0].pratos},
    {nome:'Terças',icon:'🥩',itens:cardapio[1].pratos},
    {nome:'Quartas',icon:'🐟',itens:cardapio[2].pratos},
    {nome:'Quintas',icon:'🍗',itens:cardapio[3].pratos},
    {nome:'Sextas',icon:'🥩',itens:cardapio[4].pratos},
    {nome:'Sábados',icon:'🔥',itens:cardapio[5].pratos},
    {nome:'Domingos',icon:'🍖',itens:cardapio[6].pratos},
  ];
  document.getElementById('rot-grid').innerHTML=rotDias.map(function(rd){
    return '<div class="rot-card"><div class="rot-dia">'+rd.icon+' '+rd.nome+'</div>'+
      rd.itens.map(function(it,i){
        return '<div class="rot-item'+(i===s?' atual':'')+'"><div class="rot-n">'+(i+1)+'</div><span>'+it+'</span></div>';
      }).join('')+'</div>';
  }).join('');
}
