<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#245A3F"/>
      <stop offset="100%" stop-color="#173F2A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="115%" r="70%">
      <stop offset="0%" stop-color="#B8975A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#B8975A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4B483"/>
      <stop offset="100%" stop-color="#B8975A"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- thin ornamental border -->
  <rect x="3" y="3" width="58" height="58" rx="11.5" fill="none" stroke="#B8975A" stroke-opacity="0.35" stroke-width="1"/>

  <!-- monogram M -->
  <text x="32" y="46" font-family="Liberation Serif, Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="40" text-anchor="middle" fill="url(#gold)">M</text>

  <!-- small ornament dot echoing the hero ✦ -->
  <circle cx="32" cy="12.5" r="1.4" fill="#D4B483" opacity="0.9"/>
</svg>
